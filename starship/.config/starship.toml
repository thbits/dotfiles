#[kubernetes.context_aliases]
#'.*/(?P<var_cluster>[^/]+)$' = '$var_cluster'
#'.*:(?P<var_region>[^:2]+):[^/]+/(?P<var_cluster>[^/]+)$' = '$var_cluster ($var_region)'
#'arn:aws:eks:(?P<var_region>[^:]+):\d+:cluster/(?P<var_cluster>[^/]+)$' = '$var_cluster ($var_region)'
[[kubernetes.contexts]]
